# Production config for the Stride backend.
# Hook in .claude/hooks/block-prod-writes.sh prevents agent edits to this file.

database:
  host: prod-db.internal.stride.io
  port: 5432
  pool_size: 50
  ssl: require

cache:
  host: prod-redis.internal.stride.io
  port: 6379

feature_flags:
  bulk_import: true
  new_dashboard: false
